<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #12100e;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Warm gradient orb */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,140,50,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(168,85,247,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    text-align: center;
    z-index: 10;
    position: relative;
    padding: 20px;
    max-width: 550px;
    width: 100%;
  }

  .emoji {
    font-size: 55px;
    margin-bottom: 30px;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.4em;
    font-weight: 700;
    color: #f5f0eb;
    margin-bottom: 12px;
    animation: fadeIn 0.8s ease-out;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 1.1em;
    color: #7a756f;
    margin-bottom: 40px;
    animation: fadeIn 0.8s ease-out 0.15s both;
    line-height: 1.7;
  }

  .subtitle .accent {
    color: #e8a87c;
    font-weight: 500;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg {
    color: #a89f97;
    font-size: 0.95em;
    margin-bottom: 25px;
    min-height: 22px;
    font-style: italic;
    transition: opacity 0.3s;
  }

  .buttons {
    display: flex;
    gap: 25px;
    justify-content: center;
    align-items: center;
    min-height: 100px;
    position: relative;
  }

  .btn {
    padding: 15px 45px;
    font-size: 1.1em;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }

  .btn-yes {
    background: #e8a87c;
    color: #12100e;
  }

  .btn-yes:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(232,168,124,0.25);
  }

  .btn-no {
    background: rgba(255,255,255,0.05);
    color: #555;
    border: 1px solid rgba(255,255,255,0.08);
    position: absolute;
    user-select: none;
    transition: all 0.12s ease-out;
  }

  .btn-no.converted {
    background: #e8a87c;
    color: #12100e;
    border: none;
    position: relative;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(232,168,124,0.25);
  }

  .btn-no.converted:hover {
    transform: scale(1.05);
  }

  /* Victory */
  .victory {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1000;
    background: #12100e;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }

  .victory.show {
    display: flex;
    animation: vIn 0.6s ease-out;
  }

  @keyframes vIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .v-emoji {
    font-size: 70px;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
  }

  .v-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.5em;
    font-weight: 700;
    color: #f5f0eb;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .v-sub {
    font-size: 1.1em;
    color: #7a756f;
    max-width: 420px;
    line-height: 1.7;
  }

  .v-sub .accent {
    color: #e8a87c;
    font-weight: 500;
  }

  .v-footer {
    margin-top: 30px;
    color: #a89f97;
    font-size: 0.95em;
  }

  /* Confetti */
  .confetti {
    position: fixed;
    top: -10px;
    z-index: 1001;
    pointer-events: none;
    animation: cFall linear forwards;
  }

  @keyframes cFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 600px) {
    .title { font-size: 1.8em; }
    .subtitle { font-size: 1em; }
    .btn { padding: 13px 30px; font-size: 1em; }
    .v-title { font-size: 2em; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="emoji">☕</div>
  <h1 class="title">Hey Michelle.</h1>
  <p class="subtitle">
    Weet je wat, laten we gewoon <span class="accent">terug vrienden zijn</span>.<br>
    Life's too short for het alternatief.
  </p>
  <div class="msg" id="msg"></div>
  <div class="buttons" id="btnArea">
    <button class="btn btn-yes" onclick="victory()">Oké dan</button>
    <button class="btn btn-no" id="noBtn" onmouseover="dodge()" onclick="dodge()">Nee</button>
  </div>
</div>

<div class="victory" id="victory">
  <div class="v-emoji">🤝</div>
  <h1 class="v-title">Deal.</h1>
  <p class="v-sub">
    Wist ik wel.<br>
    Welkom terug. <span class="accent">We gaan het leuk hebben.</span>
  </p>
  <p class="v-footer">— R</p>
</div>

<script>
  let attempts = 0;
  const noBtn = document.getElementById('noBtn');
  const msgEl = document.getElementById('msg');
  const btnArea = document.getElementById('btnArea');

  const messages = [
    "Hé, die knop werkt niet echt he.",
    "Probeer het gerust, ik heb alle tijd.",
    "Je maakt het jezelf alleen maar moeilijker.",
    "Zou ik niet doen als ik jou was.",
    "Oké, dit begint grappig te worden.",
    "Je weet dat je JA gaat zeggen he.",
    "Waarom vechten tegen het onvermijdelijke?",
    "Michellllle... kom op.",
    "Laatste kans om gracefully te capituleren.",
    "Nu niet meer. 😌"
  ];

  const noTexts = [
    "Nee", "Nee?", "Hmm", "Echt niet", "Misschien", 
    "Wacht...", "Twijfel", "Toe nou", "JA oké"
  ];

  function dodge() {
    attempts++;
    const max = 10;

    if (attempts <= max) {
      const area = btnArea.getBoundingClientRect();
      const w = noBtn.offsetWidth;
      const maxX = area.width - w - 10;
      const newX = Math.random() * maxX;
      const newY = 55 + Math.random() * 100;

      noBtn.style.position = 'absolute';
      noBtn.style.left = newX + 'px';
      noBtn.style.top = newY + 'px';

      const ti = Math.min(attempts - 1, noTexts.length - 1);
      noBtn.textContent = noTexts[ti];

      const mi = Math.min(attempts - 1, messages.length - 1);
      msgEl.textContent = messages[mi];

      const yesBtn = document.querySelector('.btn-yes');
      yesBtn.style.transform = `scale(${1 + attempts * 0.04})`;

      noBtn.style.transform = `scale(${Math.max(0.7, 1 - attempts * 0.03)})`;

    } else {
      noBtn.textContent = "JA oké";
      noBtn.className = "btn btn-no converted";
      noBtn.style.position = 'relative';
      noBtn.style.left = 'auto';
      noBtn.style.top = 'auto';
      noBtn.style.transform = 'scale(1)';
      noBtn.onclick = () => victory();
      noBtn.onmouseover = null;
      msgEl.textContent = "Zie je? Was niet zo moeilijk.";
    }
  }

  function victory() {
    document.getElementById('victory').classList.add('show');

    const colors = ['#e8a87c', '#c38aa5', '#f5f0eb', '#a89f97'];
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        const size = 4 + Math.random() * 6;
        c.style.left = Math.random() * 100 + 'vw';
        c.style.width = size + 'px';
        c.style.height = size + 'px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        c.style.opacity = 0.4 + Math.random() * 0.6;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 30);
    }
  }
</script>

</body>
</html>
