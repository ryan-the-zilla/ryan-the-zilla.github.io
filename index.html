<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maak een keuze</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    text-align: center;
    z-index: 10;
    position: relative;
    padding: 20px;
    max-width: 600px;
    width: 100%;
  }

  .emoji {
    font-size: 60px;
    margin-bottom: 30px;
    display: inline-block;
    animation: slowSpin 8s linear infinite;
  }

  @keyframes slowSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.2em;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 15px;
    animation: fadeInDown 0.8s ease-out;
    line-height: 1.2;
    letter-spacing: -1px;
  }

  .subtitle {
    font-size: 1.1em;
    color: #666;
    margin-bottom: 40px;
    animation: fadeInDown 0.8s ease-out 0.2s both;
    line-height: 1.7;
    font-weight: 400;
  }

  .subtitle strong {
    color: #999;
    font-weight: 600;
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Message area */
  .msg {
    color: #444;
    font-size: 0.95em;
    margin-bottom: 25px;
    min-height: 22px;
    font-style: italic;
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .buttons {
    display: flex;
    gap: 25px;
    justify-content: center;
    align-items: center;
    min-height: 100px;
    position: relative;
  }

  .btn {
    padding: 16px 45px;
    font-size: 1.15em;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .btn-yes {
    background: #fff;
    color: #0a0a0a;
    transition: all 0.2s ease;
  }

  .btn-yes:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255,255,255,0.15);
  }

  .btn-no {
    background: transparent;
    color: #333;
    border: 1px solid #222;
    position: absolute;
    user-select: none;
    transition: all 0.15s ease-out;
  }

  .btn-no.converted {
    background: #fff;
    color: #0a0a0a;
    border: none;
    position: relative;
    cursor: pointer;
    box-shadow: 0 0 40px rgba(255,255,255,0.15);
  }

  .btn-no.converted:hover {
    transform: scale(1.05);
  }

  /* Victory */
  .victory {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1000;
    background: #0a0a0a;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }

  .victory.show {
    display: flex;
    animation: victoryIn 0.6s ease-out;
  }

  @keyframes victoryIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .v-emoji {
    font-size: 80px;
    margin-bottom: 25px;
  }

  .v-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.5em;
    font-weight: 700;
    color: #fff;
    margin-bottom: 15px;
    letter-spacing: -1px;
  }

  .v-sub {
    font-size: 1.1em;
    color: #666;
    max-width: 450px;
    line-height: 1.7;
  }

  .v-sub strong {
    color: #999;
    font-weight: 600;
  }

  .v-footer {
    margin-top: 35px;
    color: #333;
    font-size: 0.9em;
    font-style: italic;
  }

  /* Confetti - minimal white */
  .confetti {
    position: fixed;
    width: 6px;
    height: 6px;
    background: #fff;
    top: -10px;
    z-index: 1001;
    pointer-events: none;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 600px) {
    .title { font-size: 1.7em; }
    .subtitle { font-size: 1em; }
    .btn { padding: 14px 30px; font-size: 1em; }
    .v-title { font-size: 2em; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="emoji">🤷‍♂️</div>
  <h1 class="title">Oké Michelle.</h1>
  <p class="subtitle">
    Ga je die moeite doen of niet?<br>
    Eén kans. <strong>Kies verstandig.</strong>
  </p>
  <div class="msg" id="msg"></div>
  <div class="buttons" id="btnArea">
    <button class="btn btn-yes" onclick="victory()">Doe ik</button>
    <button class="btn btn-no" id="noBtn" onmouseover="dodge()" onclick="dodge()">Nee</button>
  </div>
</div>

<div class="victory" id="victory">
  <div class="v-emoji">👑</div>
  <h1 class="v-title">Goede keuze.</h1>
  <p class="v-sub">
    Wist ik wel.<br>
    Welkom terug. <strong>Don't make me wait next time.</strong>
  </p>
  <p class="v-footer">— R</p>
</div>

<script>
  let attempts = 0;
  const noBtn = document.getElementById('noBtn');
  const msg = document.getElementById('msg');
  const btnArea = document.getElementById('btnArea');

  const messages = [
    "Weet je het zeker?",
    "Die knop doet het niet, probeer maar.",
    "Je verdoet je tijd.",
    "Je bent koppig. Ik waardeer dat. Maar nee.",
    "Dit is pijnlijk om naar te kijken.",
    "De enige weg is vooruit.",
    "Je gaat toch JA zeggen, waarom vechten?",
    "Volgens mij klik je stiekem best op JA.",
    "Laatste kans om het met styl te doen...",
    "Had je leuk gevonden.",
    "Klaar? Mooi."
  ];

  const noTexts = [
    "Nee", "Nee?", "Hmm", "Echt?", "Wacht", "Misschien...", 
    "Toe nou", "Oké fine", "JA al goed"
  ];

  function dodge() {
    attempts++;
    const maxAttempts = 10;

    if (attempts <= maxAttempts) {
      const area = btnArea.getBoundingClientRect();
      const btnW = noBtn.offsetWidth;
      const btnH = noBtn.offsetHeight;
      const maxX = area.width - btnW - 10;
      const newX = Math.random() * maxX;
      const newY = 60 + Math.random() * 100;

      noBtn.style.position = 'absolute';
      noBtn.style.left = newX + 'px';
      noBtn.style.top = newY + 'px';

      const textIdx = Math.min(attempts - 1, noTexts.length - 1);
      noBtn.textContent = noTexts[textIdx];

      const msgIdx = Math.min(attempts - 1, messages.length - 1);
      msg.textContent = messages[msgIdx];

      // Shrink no, grow yes
      const yesBtn = document.querySelector('.btn-yes');
      const yesScale = 1 + (attempts * 0.04);
      yesBtn.style.transform = `scale(${yesScale})`;

      const noScale = Math.max(0.7, 1 - (attempts * 0.03));
      noBtn.style.transform = `scale(${noScale})`;

    } else {
      noBtn.textContent = "JA al goed";
      noBtn.className = "btn btn-no converted";
      noBtn.style.position = 'relative';
      noBtn.style.left = 'auto';
      noBtn.style.top = 'auto';
      noBtn.style.transform = 'scale(1)';
      noBtn.onclick = () => victory();
      noBtn.onmouseover = null;
      msg.textContent = "Zie je? Was dat zo moeilijk.";
    }
  }

  function victory() {
    document.getElementById('victory').classList.add('show');
    
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        c.style.width = (3 + Math.random() * 5) + 'px';
        c.style.height = c.style.width;
        c.style.opacity = 0.3 + Math.random() * 0.7;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 25);
    }
  }
</script>

</body>
</html>
